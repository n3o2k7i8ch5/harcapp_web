  <!-- WebLLM: in-browser LLM inference engine (WebGPU). Used for the on-device
       content checks (language / narration). Loaded as an ES module from a CDN;
       module scripts are deferred, so we expose a readiness promise that Dart
       awaits before touching `window.webllm`. No HuggingFace token needed —
       models (e.g. Qwen3-1.7B) are ungated MLC builds. -->
  <script type="module">
    window.webLlmReady = (async () => {
      const m = await import('https://esm.run/@mlc-ai/web-llm');
      window.webllm = m;
      return true;
    })();
  </script>
</head>
<body>
  <!-- This script installs service_worker.js to provide PWA functionality to
       application. For more information, see:
       https://developers.google.com/web/fundamentals/primers/service-workers -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('flutter.js');
      });
    }
  </script>
  <script src="main.dart.js" type="application/javascript"></script>
</body>
