<!DOCTYPE html>
<html lang="pl">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
 
  <!-- SEO: baseline metadata for crawlability, canonical URL, and link previews (OpenGraph/Twitter). -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="HarcApp Web Platform.">
  <link rel="canonical" href="https://harcapp.web.app/">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="HarcApp">
  <meta property="og:title" content="HarcApp Web">
  <meta property="og:description" content="HarcApp Web Platform.">
  <meta property="og:url" content="https://harcapp.web.app/">
  <meta property="og:image" content="https://harcapp.web.app/icons/icon-512.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="HarcApp Web">
  <meta name="twitter:description" content="HarcApp Web Platform.">
  <meta name="twitter:image" content="https://harcapp.web.app/icons/icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="harcapp_web">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Icons -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">

  <title>HarcApp Web</title>
  <link rel="manifest" href="manifest.json">

  <!-- flutter_gemma_mediapipe: load the MediaPipe GenAI runtime from CDN and
       expose its symbols on `window` so the on-device LLM (Polish-language
       check) can run in the browser. -->
  <script type="module">
    import { FilesetResolver, LlmInference } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-genai@0.10.27';
    window.FilesetResolver = FilesetResolver;
    window.LlmInference = LlmInference;
  </script>

  <!-- flutter_gemma Cache API bridge: defines window.cacheHas / cacheGetBlobUrl
       / cachePut / … used by the package to cache the (~700 MB) model so it is
       not re-downloaded on every load. Must be a classic (non-module) script so
       the globals exist before main.dart.js runs. -->
  <script src="cache_api.js"></script>
</head>
<body>
  <!-- This script installs service_worker.js to provide PWA functionality to
       application. For more information, see:
       https://developers.google.com/web/fundamentals/primers/service-workers -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('flutter.js');
      });
    }
  </script>
  <script src="main.dart.js" type="application/javascript"></script>
</body>
</html>
